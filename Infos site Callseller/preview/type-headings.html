<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:6px;}
  h1{font:800 40px/1.1 var(--font-display);text-transform:uppercase;letter-spacing:-.01em;margin:0;color:var(--fg-primary);}

  h4{font:600 16px/1.2 var(--font-body);margin:0;color:var(--fg-primary);}

</style></head><body><div class="card">
  <h1>H1 · TRABALHE CONOSCO</h1>
  <h2>H2 · Quem é a CallSeller</h2>
  <h3>H3 · Liberdade geográfica</h3>
  <h4>H4 · Avaliação de perfil</h4>
