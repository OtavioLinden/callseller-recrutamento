<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .stat{border:1px solid var(--border-hairline);border-radius:16px;padding:18px 20px;background:var(--bg-surface);display:flex;flex-direction:column;gap:6px;}
  .stat.accent{border-color:var(--cs-green-500);box-shadow:inset 0 1px 0 rgba(255,255,255,.04);}
  .num{font:800 40px/1 var(--font-display);letter-spacing:-.01em;color:var(--fg-primary);}
  .num.green{color:var(--cs-green-400);}
  .lab{font-family:var(--font-body);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted);}
  .desc{font-family:var(--font-body);font-size:13px;color:var(--fg-secondary);margin-top:2px;}
</style></head><body><div class="card">
  <div class="stat"><div class="lab">Experiência</div><div class="num green">+7 ANOS</div><div class="desc">no mercado digital</div></div>
  <div class="stat accent"><div class="lab">Recuperação</div><div class="num">+R$ 7M</div><div class="desc">vendas / mês</div></div>
  <div class="stat"><div class="lab">Parceiros</div><div class="num green">+50</div><div class="desc">impactados pela tecnologia</div></div>
  <div class="stat"><div class="lab">Vendedores</div><div class="num green">+100</div><div class="desc">atuando em todo o Brasil</div></div>
</div></body></html>
