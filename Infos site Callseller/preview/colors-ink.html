<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:20px 22px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;gap:6px;}
  .sw{flex:1;height:72px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid var(--border-hairline);font-family:var(--font-mono);font-size:10px;}
  .sw .name{font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-body);font-size:10px;}
  .sw .hex{opacity:.7;}
  .label{font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);}
</style></head><body><div class="card">
<div class="label">Ink · neutral ramp · black → white</div>
<div class="row">
  <div class="sw" style="background:var(--cs-ink-0);color:#fff"><div class="name">0</div><div class="hex">#000</div></div>
  <div class="sw" style="background:var(--cs-ink-50);color:#fff"><div class="name">50</div><div class="hex">#0A0C0A</div></div>
  <div class="sw" style="background:var(--cs-ink-100);color:#fff"><div class="name">100</div><div class="hex">#111411</div></div>
  <div class="sw" style="background:var(--cs-ink-200);color:#fff"><div class="name">200</div><div class="hex">#1A1E1A</div></div>
  <div class="sw" style="background:var(--cs-ink-300);color:#fff"><div class="name">300</div><div class="hex">#262B26</div></div>
  <div class="sw" style="background:var(--cs-ink-400);color:#fff"><div class="name">400</div><div class="hex">#3A403A</div></div>
  <div class="sw" style="background:var(--cs-ink-500);color:#fff"><div class="name">500</div><div class="hex">#5A615A</div></div>
  <div class="sw" style="background:var(--cs-ink-600);color:#000"><div class="name">600</div><div class="hex">#8B918B</div></div>
  <div class="sw" style="background:var(--cs-ink-700);color:#000"><div class="name">700</div><div class="hex">#B6BAB6</div></div>
  <div class="sw" style="background:var(--cs-ink-800);color:#000"><div class="name">800</div><div class="hex">#D9DCD9</div></div>
  <div class="sw" style="background:var(--cs-ink-900);color:#000"><div class="name">900</div><div class="hex">#F1F3F1</div></div>
  <div class="sw" style="background:var(--cs-ink-1000);color:#000"><div class="name">1000</div><div class="hex">#FFF</div></div>
</div></div></body></html>
