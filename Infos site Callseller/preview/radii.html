<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:22px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:end;}
  .r{background:var(--bg-raised);border:1px solid var(--border-hairline);aspect-ratio:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head><body><div class="card">
  <div class="r" style="border-radius:4px">4</div>
  <div class="r" style="border-radius:6px">6</div>
  <div class="r" style="border-radius:10px">10</div>
  <div class="r" style="border-radius:16px">16</div>
  <div class="r" style="border-radius:24px">24</div>
  <div class="r" style="border-radius:32px">32</div>
</div></body></html>
