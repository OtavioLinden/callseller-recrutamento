<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:20px 22px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .tok{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border-hairline);border-radius:10px;background:var(--bg-surface);}
  .chip{width:36px;height:36px;border-radius:8px;flex-shrink:0;}
  .meta{font-family:var(--font-body);font-size:12px;}
  .meta b{display:block;font-weight:700;color:var(--fg-primary);}
  .meta span{color:var(--fg-muted);font-family:var(--font-mono);font-size:11px;}
</style></head><body><div class="card">
  <div class="tok"><div class="chip" style="background:var(--bg-accent)"></div><div class="meta"><b>accent</b><span>--bg-accent · green 500</span></div></div>
  <div class="tok"><div class="chip" style="background:var(--bg-accent-soft)"></div><div class="meta"><b>accent soft</b><span>14% green tint</span></div></div>
  <div class="tok"><div class="chip" style="background:var(--cs-success)"></div><div class="meta"><b>success</b><span>#1FB526</span></div></div>
  <div class="tok"><div class="chip" style="background:var(--cs-warn)"></div><div class="meta"><b>warn</b><span>#F2B705</span></div></div>
  <div class="tok"><div class="chip" style="background:var(--cs-danger)"></div><div class="meta"><b>danger</b><span>#E5484D</span></div></div>
  <div class="tok"><div class="chip" style="background:var(--cs-info)"></div><div class="meta"><b>info</b><span>#5B9BD5</span></div></div>
</div></body></html>
