<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:20px 22px;min-height:110px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{flex:1;min-width:78px;height:72px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;border:1px solid var(--border-hairline);font-family:var(--font-mono);font-size:10px;color:var(--fg-primary);}
  .sw .name{font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--font-body);font-size:10px;}
  .sw .hex{opacity:.7;}
  .label{font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);}
</style></head><body><div class="card">
<div class="label">Green scale · brand primary</div>
<div class="row">
  <div class="sw" style="background:var(--cs-green-50);color:#04170A"><div class="name">50</div><div class="hex">#E8FBE6</div></div>
  <div class="sw" style="background:var(--cs-green-100);color:#04170A"><div class="name">100</div><div class="hex">#C6F5BE</div></div>
  <div class="sw" style="background:var(--cs-green-200);color:#04170A"><div class="name">200</div><div class="hex">#8DEA80</div></div>
  <div class="sw" style="background:var(--cs-green-300);color:#04170A"><div class="name">300</div><div class="hex">#55DF44</div></div>
  <div class="sw" style="background:var(--cs-green-400);color:#04170A"><div class="name">400</div><div class="hex">#2CCE1C</div></div>
  <div class="sw" style="background:var(--cs-green-500);color:#04170A;box-shadow:var(--glow-green-sm)"><div class="name">500 ★</div><div class="hex">#1FB526</div></div>
  <div class="sw" style="background:var(--cs-green-600);color:#fff"><div class="name">600</div><div class="hex">#159A1D</div></div>
  <div class="sw" style="background:var(--cs-green-700);color:#fff"><div class="name">700</div><div class="hex">#0F7A18</div></div>
  <div class="sw" style="background:var(--cs-green-800);color:#fff"><div class="name">800</div><div class="hex">#0A5A12</div></div>
  <div class="sw" style="background:var(--cs-green-900);color:#fff"><div class="name">900</div><div class="hex">#053008</div></div>
</div></div></body></html>
