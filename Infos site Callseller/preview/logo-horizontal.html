<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{padding:0;display:grid;grid-template-columns:1fr 1fr;gap:0;}
  .a,.b{padding:24px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;justify-content:center;min-height:120px;}
  .a{background:#fff;}
  .b{background:#000;}
  .a img,.b img{max-width:100%;max-height:70px;object-fit:contain;}
  .lab{font-family:var(--font-body);font-size:10px;letter-spacing:.14em;text-transform:uppercase;}
  .a .lab{color:#666;}
  .b .lab{color:#8B918B;}
</style></head><body><div class="card">
  <div class="a"><img src="../assets/logo-horizontal-black.png" alt="logo"/><div class="lab">horizontal · dark on light</div></div>
  <div class="b"><img src="../assets/logo-horizontal-white.png" alt="logo"/><div class="lab">horizontal · light on dark</div></div>
</div></body></html>
