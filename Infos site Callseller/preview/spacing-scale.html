<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:20px 22px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .cell{border:1px solid var(--border-hairline);border-radius:10px;padding:10px 12px;background:var(--bg-surface);display:flex;flex-direction:column;gap:6px;align-items:flex-start;}
  .box{background:var(--cs-green-500);}
  .label{font-family:var(--font-body);font-size:11px;color:var(--fg-muted);letter-spacing:.04em;}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--fg-primary);}
</style></head><body><div class="card">
  <div class="cell"><div class="box" style="width:4px;height:4px;border-radius:2px"></div><div class="name">1 · 4px</div></div>
  <div class="cell"><div class="box" style="width:8px;height:8px;border-radius:2px"></div><div class="name">2 · 8px</div></div>
  <div class="cell"><div class="box" style="width:12px;height:12px;border-radius:2px"></div><div class="name">3 · 12px</div></div>
  <div class="cell"><div class="box" style="width:16px;height:16px;border-radius:2px"></div><div class="name">4 · 16px</div></div>
  <div class="cell"><div class="box" style="width:24px;height:24px;border-radius:2px"></div><div class="name">6 · 24px</div></div>
  <div class="cell"><div class="box" style="width:32px;height:32px;border-radius:2px"></div><div class="name">8 · 32px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px;border-radius:2px"></div><div class="name">12 · 48px</div></div>
  <div class="cell"><div class="box" style="width:64px;height:64px;border-radius:2px"></div><div class="name">16 · 64px</div></div>
</div></body></html>
