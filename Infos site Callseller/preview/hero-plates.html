<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:0;display:grid;grid-template-columns:1fr 1fr;gap:0;}
  .cell{padding:16px;min-height:150px;display:flex;align-items:center;justify-content:center;position:relative;}
  .cell img{max-width:100%;max-height:160px;object-fit:contain;border-radius:12px;}
  .lab{position:absolute;bottom:6px;left:10px;font-family:var(--font-body);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-muted);}
</style></head><body><div class="card">
  <div class="cell"><img src="../assets/recrutamento-radial.png"/><div class="lab">radial glow</div></div>
  <div class="cell"><img src="../assets/recrutamento-3d-dark.png"/><div class="lab">3D dark</div></div>
</div></body></html>
