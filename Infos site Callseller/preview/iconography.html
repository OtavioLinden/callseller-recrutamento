<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:22px;display:flex;flex-wrap:wrap;gap:20px;align-items:center;}
  .ic{color:var(--cs-green-400);display:flex;flex-direction:column;align-items:center;gap:4px;}
  .ic svg{width:26px;height:26px;stroke-width:1.75;}
  .ic span{font-family:var(--font-mono);font-size:9px;color:var(--fg-muted);}
</style></head><body><div class="card">
  <div class="ic"><i data-lucide="shield-check"></i><span>shield-check</span></div>
  <div class="ic"><i data-lucide="award"></i><span>award</span></div>
  <div class="ic"><i data-lucide="cpu"></i><span>cpu</span></div>
  <div class="ic"><i data-lucide="globe"></i><span>globe</span></div>
  <div class="ic"><i data-lucide="trending-up"></i><span>trending-up</span></div>
  <div class="ic"><i data-lucide="trophy"></i><span>trophy</span></div>
  <div class="ic"><i data-lucide="zap"></i><span>zap</span></div>
  <div class="ic"><i data-lucide="settings"></i><span>settings</span></div>
  <div class="ic"><i data-lucide="headphones"></i><span>headphones</span></div>
  <div class="ic"><i data-lucide="clipboard-check"></i><span>clipboard-check</span></div>
  <div class="ic"><i data-lucide="message-circle-check"></i><span>msg-check</span></div>
  <div class="ic"><i data-lucide="eye"></i><span>eye</span></div>
  <div class="ic"><i data-lucide="arrow-up-right"></i><span>arrow-ur</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
