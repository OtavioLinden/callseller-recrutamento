<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:24px 26px;display:flex;flex-direction:column;gap:14px;}
  .spec{font-family:var(--font-display);font-weight:800;font-size:72px;line-height:.95;letter-spacing:-0.01em;text-transform:uppercase;color:var(--fg-primary);}
  .sub{font-family:var(--font-display);font-weight:700;font-size:34px;line-height:1;letter-spacing:0;text-transform:uppercase;color:var(--fg-accent);}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);letter-spacing:.04em;}
</style></head><body><div class="card">
  <div class="spec">RECRUTAMENTO</div>
  <div class="sub">Nenhuma aula vence</div>
  <div class="meta">Barlow Condensed · 800/700 · tracking −1% · UPPERCASE · line-height 1.05</div>
</div></body></html>
