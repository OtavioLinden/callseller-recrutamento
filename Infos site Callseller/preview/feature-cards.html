<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;padding:0;background:var(--bg-page);}
  .card{padding:22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .feat{border:1px solid var(--border-hairline);border-radius:14px;padding:16px;background:var(--bg-surface);display:flex;flex-direction:column;gap:8px;}
  .ic{width:36px;height:36px;border-radius:10px;background:var(--bg-accent-soft);display:flex;align-items:center;justify-content:center;color:var(--cs-green-400);}
  .ic svg{width:20px;height:20px;}
  .t{font-family:var(--font-body);font-weight:700;font-size:14px;color:var(--fg-primary);}
  .d{font-family:var(--font-body);font-size:12px;color:var(--fg-muted);line-height:1.5;}
</style></head><body><div class="card">
  <div class="feat"><div class="ic"><i data-lucide="globe"></i></div><div class="t">Liberdade geográfica</div><div class="d">Home Office 100% — trabalhe de onde quiser.</div></div>
  <div class="feat"><div class="ic"><i data-lucide="trending-up"></i></div><div class="t">Projeção de ganhos</div><div class="d">Ganhos acima da média, compatíveis com dedicação.</div></div>
  <div class="feat"><div class="ic"><i data-lucide="trophy"></i></div><div class="t">Valorização do resultado</div><div class="d">Reconhecimento real para quem entrega.</div></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
